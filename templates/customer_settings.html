{% extends "base.html" %}

{% block title %}Customer Settings{% endblock %}

{% block content %}
<section class="page-header reveal">
    <div>
        <span class="eyebrow">Account</span>
        <h1>Profile Settings</h1>
        <p>Update your contact details to keep service coordination smooth.</p>
    </div>
</section>

<section class="card form-card reveal">
    <form method="POST" action="{{ url_for('update_customer_profile') }}" class="form-container service-form">
        <div class="form-grid two-col">
            <div>
                <label for="phone">Phone</label>
                <input id="phone" name="phone" type="tel" value="{{ user.phone or '' }}" placeholder="Mobile number">
            </div>
            <div>
                <label for="address">Address</label>
                <input id="address" name="address" type="text" value="{{ user.address or '' }}" placeholder="House number, street, city">
            </div>
        </div>
        <div class="form-actions">
            <button class="btn-primary" type="submit">Save Settings</button>
        </div>
    </form>
</section>
{% endblock %}
