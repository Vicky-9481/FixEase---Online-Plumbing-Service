{% extends "base.html" %}

{% block title %}Customer Settings{% endblock %}

{% block content %}
<section class="panel reveal">
    <div class="section-header">
        <div>
            <span class="eyebrow">Account</span>
            <h1 class="dashboard-title">Profile Settings</h1>
            <p class="muted">Update your phone number and address for faster service coordination.</p>
        </div>
    </div>
</section>

<section class="panel reveal">
    <form method="POST" action="{{ url_for('update_customer_profile') }}" class="form-grid">
        <div>
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" value="{{ user.phone or '' }}" placeholder="Your mobile number">
        </div>
        <div>
            <label for="address">Address</label>
            <input id="address" name="address" type="text" value="{{ user.address or '' }}" placeholder="House number, street, city">
        </div>
        <div class="span-full">
            <button type="submit">Save Settings</button>
        </div>
    </form>
</section>
{% endblock %}
