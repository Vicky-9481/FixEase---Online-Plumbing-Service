<header class="topbar">
    <div class="topbar-left">
        <button class="icon-button mobile-sidebar-toggle" type="button" data-sidebar-toggle aria-label="Toggle sidebar">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="title-stack">
            <span class="eyebrow">FixEase</span>
            <h1 class="topbar-title">{{ page_title or "Dashboard" }}</h1>
        </div>
    </div>

    <form class="topbar-search" action="{{ url_for('view_plumbers') }}" method="get" role="search">
        <svg viewBox="0 0 24 24" aria-hidden="true" class="search-icon">
            <path d="M10.5 4a6.5 6.5 0 1 1 4.02 11.62l4.43 4.43-1.42 1.42-4.43-4.43A6.5 6.5 0 0 1 10.5 4Zm0 2A4.5 4.5 0 1 0 15 10.5 4.5 4.5 0 0 0 10.5 6Z"/>
        </svg>
        <input type="search" name="search" value="{{ topbar_search_value or request.args.get('search', '') }}" placeholder="Search plumbers, areas, or specialties">
    </form>

    <div class="topbar-actions">
        {% if current_user_data %}
            <a class="icon-button bell-button" href="{{ notifications_url }}" aria-label="Notifications">
                <span class="bell-wrap">
                <svg viewBox="0 0 24 24" aria-hidden="true" class="bell-icon">
                    <path d="M12 22a2.2 2.2 0 0 0 2.15-2h-4.3A2.2 2.2 0 0 0 12 22Zm7-6V11a7 7 0 0 0-5-6.72V4a2 2 0 0 0-4 0v.28A7 7 0 0 0 5 11v5l-2 2v1h18v-1l-2-2Z"/>
                </svg>
                {% if unread_notifications %}
                    <span class="notification-badge">{{ unread_notifications }}</span>
                {% endif %}
                </span>
            </a>
        {% endif %}
        <a class="btn-primary topbar-book" href="{{ url_for('request_service') }}">Book Service</a>
    </div>
</header>
